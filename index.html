<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farebná paleta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Horná lišta */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Ľavá časť - hodiny a checkbox */
        .clock-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #f0f0f0;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .clock {
            font-size: 72px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        /* Veľký checkbox */
        .big-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-checkbox input {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        /* Plocha na zobrazenie farby vpravo hore */
        .color-display {
            width: 200px;
            height: 100px;
            background-color: #ffffff;
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.2s ease;
        }

        /* Sekcia farieb */
        .colors-section {
            margin-top: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .color-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-square {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid #ddd;
        }

        .color-square:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-color: #333;
        }

        /* Rozšírené farby - usporiadané podľa dúhy */
        .extended-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .extended-square {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #ccc;
        }

        .extended-square:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border-color: #333;
        }

        /* REBOOT sekcia */
        .reboot-section {
            margin-top: 40px;
            padding: 20px;
            background-color: #f8f8f8;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .reboot-button {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .reboot-button:hover {
            background-color: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .reboot-button:active {
            transform: scale(0.98);
        }

        .counter-container {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background-color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .counter-label {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .counter-value {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            font-family: 'Courier New', monospace;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="clock-container">
            <div class="clock" id="clock">--:--:--</div>
            <div class="big-checkbox">
                <input type="checkbox" id="hideSecondsCheckbox">
            </div>
        </div>
        <div class="color-display" id="colorDisplay"></div>
    </div>

    <div class="colors-section">
        <div class="section-title">🎨 Základné farby (epapier)</div>
        <div class="color-grid" id="basicColors"></div>

        <div class="section-title">🌈 Rozšírené farby</div>
        <div class="extended-grid" id="extendedColors"></div>
    </div>

    <div class="reboot-section">
        <button class="reboot-button" id="rebootButton">🔄 REBOOT</button>
        <div class="counter-container">
            <span class="counter-label">Počet REBOOTOV:</span>
            <span class="counter-value" id="counterValue">0</span>
        </div>
    </div>

    <script>
        // Základné farby (7 farieb epapiera)
        const basicColors = [
            { name: "Červená", code: "#FF0000" },
            { name: "Zelená", code: "#00FF00" },
            { name: "Modrá", code: "#0000FF" },
            { name: "Žltá", code: "#FFFF00" },
            { name: "Oranžová", code: "#FFA500" },
            { name: "Fialová", code: "#800080" },
            { name: "Ružová", code: "#FFC0CB" }
        ];

        // Rozšírené farby - usporiadané podľa dúhy (červená, oranžová, žltá, zelená, modrá, indigová, fialová)
        const extendedColors = [
            // Červená odtiene
            { name: "Červená", code: "#FF0000" },
            { name: "Tmavočervená", code: "#8B0000" },
            { name: "Vínová", code: "#800000" },
            { name: "Koralová", code: "#FF7F50" },
            { name: "Lososová", code: "#FA8072" },
            // Oranžová odtiene
            { name: "Oranžová", code: "#FFA500" },
            { name: "Oranžovočervená", code: "#FF4500" },
            { name: "Oker", code: "#CC7722" },
            { name: "Jantárová", code: "#FFBF00" },
            // Žltá odtiene
            { name: "Žltá", code: "#FFFF00" },
            { name: "Zlatá", code: "#FFD700" },
            { name: "Krémová", code: "#FFFDD0" },
            { name: "Béžová", code: "#F5F5DC" },
            // Zelená odtiene
            { name: "Zelená", code: "#00FF00" },
            { name: "Tmavozelená", code: "#006400" },
            { name: "Olivová", code: "#808000" },
            { name: "Mätová", code: "#98FB98" },
            { name: "Tyrkysová", code: "#40E0D0" },
            // Modrá odtiene
            { name: "Modrá", code: "#0000FF" },
            { name: "Tmavomodrá", code: "#00008B" },
            { name: "Námornícka modrá", code: "#000080" },
            { name: "Azúrová", code: "#007FFF" },
            { name: "Neónová modrá", code: "#1E90FF" },
            // Indigová a fialová odtiene
            { name: "Indigo", code: "#4B0082" },
            { name: "Fialová", code: "#800080" },
            { name: "Levanduľová", code: "#E6E6FA" },
            { name: "Fuchsiová", code: "#FF00FF" },
            { name: "Ružová", code: "#FFC0CB" },
            // Neutrálne farby
            { name: "Biela", code: "#FFFFFF" },
            { name: "Sivá", code: "#808080" },
            { name: "Čierna", code: "#000000" },
            { name: "Hnedá", code: "#A52A2A" }
        ];

        // Premenné pre počítadlo REBOOT
        let rebootCounter = 0;
        
        // Načítanie uloženého počítadla z localStorage
        function loadCounter() {
            const savedCounter = localStorage.getItem('rebootCounter');
            if (savedCounter !== null) {
                rebootCounter = parseInt(savedCounter);
                updateCounterDisplay();
            }
        }
        
        // Uloženie počítadla do localStorage
        function saveCounter() {
            localStorage.setItem('rebootCounter', rebootCounter);
        }
        
        // Aktualizácia zobrazenia počítadla
        function updateCounterDisplay() {
            document.getElementById('counterValue').textContent = rebootCounter;
        }
        
        // Funkcia na REBOOT (inkrementácia počítadla)
        function reboot() {
            rebootCounter++;
            
            // Po hodnote 10 sa vynuluje
            if (rebootCounter >= 10) {
                rebootCounter = 0;
            }
            
            updateCounterDisplay();
            saveCounter();
            
            // Simulácia REBOOT - v reálnom prostredí by tu bola skutočná reboot funkcia
            console.log(`REBOOT č. ${rebootCounter} - Systém sa reštartuje...`);
        }

        // Funkcia na aktualizáciu času
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const hideSeconds = document.getElementById('hideSecondsCheckbox').checked;
            
            let timeString;
            if (hideSeconds) {
                timeString = `${hours}:${minutes}`;
            } else {
                timeString = `${hours}:${minutes}:${seconds}`;
            }
            
            document.getElementById('clock').textContent = timeString;
        }

        // Funkcia na zafarbenie plochy
        function setColor(colorCode) {
            const colorDisplay = document.getElementById('colorDisplay');
            colorDisplay.style.backgroundColor = colorCode;
        }

        // Vytvorenie základných farieb
        function renderBasicColors() {
            const container = document.getElementById('basicColors');
            basicColors.forEach(color => {
                const square = document.createElement('div');
                square.className = 'color-square';
                square.style.backgroundColor = color.code;
                square.title = color.name;
                square.onclick = () => setColor(color.code);
                container.appendChild(square);
            });
        }

        // Vytvorenie rozšírených farieb (usporiadané podľa dúhy)
        function renderExtendedColors() {
            const container = document.getElementById('extendedColors');
            extendedColors.forEach(color => {
                const square = document.createElement('div');
                square.className = 'extended-square';
                square.style.backgroundColor = color.code;
                square.title = color.name;
                square.onclick = () => setColor(color.code);
                container.appendChild(square);
            });
        }

        // Načítanie počítadla pri štarte
        loadCounter();
        
        // Inicializácia
        renderBasicColors();
        renderExtendedColors();
        
        // Spustenie hodín (aktualizácia každú sekundu)
        updateClock();
        setInterval(updateClock, 1000);
        
        // Event listener pre checkbox
        document.getElementById('hideSecondsCheckbox').addEventListener('change', updateClock);
        
        // Event listener pre REBOOT tlačidlo
        document.getElementById('rebootButton').addEventListener('click', reboot);
        
        // Predvolená farba plochy
        setColor("#FFFFFF");
    </script>
</body>
</html>
