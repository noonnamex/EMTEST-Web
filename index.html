<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farebná paleta + Kreslenie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: clamp(8px, 2vw, 40px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .main-container {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Horná lišta */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: clamp(8px, 1.5vw, 40px);
            flex-wrap: wrap;
            margin-bottom: clamp(15px, 3vw, 80px);
        }

        .clock-window {
            background-color: #f0f0f0;
            border-radius: clamp(8px, 1.2vw, 30px);
            box-shadow: 0 0.2vw 0.6vw rgba(0,0,0,0.1);
            padding: clamp(8px, 1.2vw, 30px) clamp(12px, 1.8vw, 40px);
            width: 35%;
            min-width: 180px;
            border: 0.15vw solid #ddd;
        }

        .clock {
            font-size: clamp(20px, 4vw, 100px);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.2vw;
            color: #333;
            background-color: #fff;
            padding: clamp(6px, 1vw, 25px) clamp(8px, 1.2vw, 30px);
            border-radius: clamp(6px, 0.8vw, 20px);
            text-align: center;
            width: 100%;
        }

        .checkbox-window {
            background-color: #f0f0f0;
            border-radius: clamp(8px, 1.2vw, 30px);
            box-shadow: 0 0.2vw 0.6vw rgba(0,0,0,0.1);
            padding: clamp(8px, 1.2vw, 30px);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 10%;
            min-width: 70px;
            border: 0.15vw solid #ddd;
        }

        .big-checkbox input {
            width: clamp(25px, 3.5vw, 80px);
            height: clamp(25px, 3.5vw, 80px);
            cursor: pointer;
        }

        .color-window {
            background-color: #f0f0f0;
            border-radius: clamp(8px, 1.2vw, 30px);
            box-shadow: 0 0.2vw 0.6vw rgba(0,0,0,0.1);
            padding: clamp(6px, 0.8vw, 20px) clamp(10px, 1.5vw, 35px);
            flex: 1;
            min-width: 180px;
            border: 0.15vw solid #ddd;
        }

        .color-display {
            width: 100%;
            height: clamp(50px, 6vw, 150px);
            background-color: #000000;
            border: 0.2vw solid #333;
            border-radius: clamp(6px, 0.8vw, 20px);
            transition: background-color 0.2s ease;
        }

        /* Sekcia farieb */
        .colors-section {
            margin-top: clamp(15px, 2.5vw, 60px);
            transition: opacity 0.2s ease;
        }

        .color-grid {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(6px, 1.2vw, 30px);
            margin-bottom: clamp(15px, 2.5vw, 60px);
            justify-content: center;
        }

        .color-square {
            width: clamp(60px, 7vw, 250px);
            height: clamp(60px, 7vw, 250px);
            border-radius: clamp(5px, 0.8vw, 20px);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 0.15vw solid #ddd;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .color-square:active {
            transform: scale(0.95);
        }

        .extended-grid {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(5px, 0.8vw, 20px);
            margin-bottom: clamp(12px, 1.8vw, 40px);
            justify-content: center;
        }

        .extended-square {
            width: clamp(50px, 6vw, 220px);
            height: clamp(50px, 6vw, 220px);
            border-radius: clamp(4px, 0.6vw, 15px);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 0.15vw solid #ccc;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .extended-square:active {
            transform: scale(0.95);
        }

        /* REBOOT sekcia */
        .reboot-section {
            margin-top: clamp(20px, 3vw, 80px);
            padding: clamp(10px, 1.5vw, 40px);
            background-color: #f8f8f8;
            border-radius: clamp(10px, 1.5vw, 40px);
            text-align: center;
            border: 0.15vw solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2.5vw, 60px);
            flex-wrap: wrap;
        }

        .reboot-buttons {
            display: flex;
            gap: clamp(8px, 1.5vw, 20px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .reboot-button {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: clamp(10px, 1.5vw, 35px) clamp(20px, 3vw, 70px);
            font-size: clamp(14px, 2vw, 48px);
            font-weight: bold;
            border-radius: clamp(8px, 1.2vw, 30px);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0.2vw 0.6vw rgba(0,0,0,0.15);
            touch-action: manipulation;
        }

        .reboot-button:active {
            transform: scale(0.98);
        }

        .counter-container {
            display: inline-flex;
            align-items: center;
            gap: clamp(8px, 1.2vw, 30px);
            background-color: white;
            padding: clamp(8px, 1.2vw, 30px) clamp(12px, 1.8vw, 45px);
            border-radius: clamp(8px, 1.2vw, 30px);
            box-shadow: 0 0.15vw 0.5vw rgba(0,0,0,0.1);
        }

        .counter-label {
            font-size: clamp(12px, 1.5vw, 36px);
            font-weight: bold;
            color: #333;
        }

        .counter-value {
            font-size: clamp(20px, 3.5vw, 80px);
            font-weight: bold;
            color: #ff4444;
            font-family: 'Courier New', monospace;
            min-width: clamp(40px, 5vw, 120px);
            text-align: center;
        }

        /* Kresliace plátno */
        .draw-section {
            margin-top: clamp(20px, 3vw, 80px);
        }
        
        .draw-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(10px, 1.5vw, 35px);
            flex-wrap: wrap;
            gap: clamp(8px, 1.5vw, 20px);
        }
        
        .draw-title {
            font-size: clamp(14px, 1.8vw, 42px);
            font-weight: bold;
            color: #333;
        }
        
        .clear-button {
            padding: clamp(6px, 1vw, 20px) clamp(12px, 2vw, 40px);
            background-color: #666;
            color: white;
            border: none;
            border-radius: clamp(6px, 1vw, 25px);
            font-size: clamp(12px, 1.5vw, 32px);
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .clear-button:active {
            transform: scale(0.98);
            background-color: #555;
        }
        
        canvas {
            border: 0.2vw solid #333;
            border-radius: clamp(6px, 1vw, 25px);
            background-color: white;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0.15vw 0.6vw rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            touch-action: none;
            aspect-ratio: 16 / 5;
        }

        /* NOVÉ: Dve prepínacie tlačidlá pod plátnom */
        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: clamp(15px, 3vw, 50px);
            margin-top: clamp(15px, 2vw, 40px);
            margin-bottom: clamp(10px, 1.5vw, 30px);
        }
        
        .mode-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: clamp(10px, 1.5vw, 25px) clamp(20px, 3vw, 50px);
            font-size: clamp(16px, 2.5vw, 40px);
            font-weight: bold;
            border-radius: clamp(12px, 2vw, 40px);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0.2vw 0.6vw rgba(0,0,0,0.2);
            touch-action: manipulation;
            flex: 0 1 auto;
            min-width: 150px;
            text-align: center;
        }
        
        .mode-btn.active {
            background-color: #2E7D32;
            box-shadow: inset 0 0.1vw 0.3vw rgba(0,0,0,0.3);
            transform: scale(0.98);
        }
        
        .mode-btn:active {
            transform: scale(0.96);
        }

        /* Biele plátno pre mód Plátno (kreslenie čiernou) */
        .whiteboard-canvas {
            border: 0.2vw solid #333;
            border-radius: clamp(6px, 1vw, 25px);
            background-color: white;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0.15vw 0.6vw rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            touch-action: none;
            aspect-ratio: 16 / 5;
        }
        
        /* Skrytie sekcie farieb v móde Plátno */
        .colors-section.hidden {
            display: none;
        }
        
        /* Zobrazenie bieleho plátna len v móde Plátno */
        #whiteboardCanvas {
            display: none;
        }
        
        #whiteboardCanvas.active {
            display: block;
        }
        
        /* Normálne plátno (pre farby) */
        #drawCanvas {
            display: block;
        }
        
        #drawCanvas.hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .clock-window, .checkbox-window, .color-window {
                width: 100%;
                min-width: auto;
            }
            
            .reboot-section {
                flex-direction: column;
                gap: clamp(12px, 2vw, 20px);
            }
            
            .reboot-buttons {
                width: 100%;
                flex-direction: column;
            }
            
            .reboot-button {
                width: 100%;
            }
            
            .counter-container {
                width: 100%;
                justify-content: center;
            }
            
            .draw-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .draw-title {
                text-align: center;
            }
            
            .clear-button {
                width: 100%;
                white-space: normal;
                text-align: center;
            }
            
            .mode-buttons {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            
            .mode-btn {
                width: 100%;
                min-width: unset;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: clamp(5px, 1.5vw, 10px);
            }
            
            .color-square {
                width: clamp(45px, 12vw, 70px);
                height: clamp(45px, 12vw, 70px);
            }
            
            .extended-square {
                width: clamp(40px, 10vw, 60px);
                height: clamp(40px, 10vw, 60px);
            }
            
            .reboot-button {
                padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 20px);
                font-size: clamp(12px, 3vw, 16px);
            }
            
            .counter-label {
                font-size: clamp(10px, 2.5vw, 14px);
            }
            
            .counter-value {
                font-size: clamp(16px, 4vw, 24px);
                min-width: clamp(35px, 8vw, 50px);
            }
            
            .draw-title {
                font-size: clamp(12px, 2.5vw, 16px);
            }
            
            .clear-button {
                font-size: clamp(10px, 2vw, 14px);
                padding: clamp(5px, 1.2vw, 8px) clamp(8px, 2vw, 12px);
            }
            
            .mode-btn {
                font-size: clamp(14px, 3vw, 20px);
                padding: clamp(8px, 1.2vw, 12px) clamp(12px, 2vw, 20px);
            }
        }

        @media (hover: hover) {
            .color-square:hover, .extended-square:hover {
                transform: scale(1.02);
                box-shadow: 0 0.3vw 1vw rgba(0,0,0,0.2);
            }
            
            .reboot-button:hover {
                background-color: #ff2222;
                transform: scale(1.02);
            }
            
            .clear-button:hover {
                background-color: #555;
            }
            
            .mode-btn:hover {
                background-color: #45a049;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="top-bar">
            <div class="clock-window">
                <div class="clock" id="clock">--:--:--</div>
            </div>
            <div class="checkbox-window">
                <div class="big-checkbox">
                    <input type="checkbox" id="hideSecondsCheckbox">
                </div>
            </div>
            <div class="color-window">
                <div class="color-display" id="colorDisplay"></div>
            </div>
        </div>

        <div class="colors-section" id="colorsSection">
            <div class="color-grid" id="basicColors"></div>
            <div id="colorRows"></div>
        </div>

        <div class="reboot-section">
            <div class="reboot-buttons">
                <button class="reboot-button" id="rebootButton">REBOOT</button>
                <button class="reboot-button" id="hammerButton">HAMMER REBOOT</button>
                <button class="reboot-button" id="nukeButton">NUKE</button>
            </div>
            <div class="counter-container">
                <span class="counter-label">DAMAGE:</span>
                <span class="counter-value" id="counterValue">0</span>
            </div>
        </div>

        <div class="draw-section">
            <div class="draw-header">
                <div class="draw-title">Kresliace plátno</div>
                <button class="clear-button" id="clearButton">VYMAZAŤ PLÁTNO</button>
            </div>
            <!-- Farebné plátno (pôvodné) -->
            <canvas id="drawCanvas" width="1600" height="500"></canvas>
            <!-- Biele plátno pre mód Plátno (kreslenie čiernou) -->
            <canvas id="whiteboardCanvas" width="1600" height="500"></canvas>
        </div>

        <!-- NOVÉ: Dve prepínacie tlačidlá -->
        <div class="mode-buttons">
            <button class="mode-btn" id="colorsModeBtn">🎨 Colors</button>
            <button class="mode-btn" id="canvasModeBtn">✏️ Plátno</button>
        </div>
    </div>

    <canvas id="effectCanvas"></canvas>

    <script>
        // EFEKTY (rovnaké ako pôvodne)
        const effectCanvas = document.getElementById("effectCanvas");
        const effectCtx = effectCanvas.getContext("2d");

        function resizeEffectCanvas() {
            effectCanvas.width = window.innerWidth;
            effectCanvas.height = window.innerHeight;
        }
        resizeEffectCanvas();
        window.addEventListener("resize", resizeEffectCanvas);

        function drawCrack(x, y, length, angle, depth) {
            if(depth <= 0) return;
            if(length < 8) return;
            const x2 = x + Math.cos(angle) * length;
            const y2 = y + Math.sin(angle) * length;
            effectCtx.beginPath();
            effectCtx.moveTo(x, y);
            effectCtx.lineTo(x2, y2);
            effectCtx.stroke();
            drawCrack(x2, y2, length * 0.7, angle + (Math.random() - 0.5) * 0.7, depth - 1);
            drawCrack(x2, y2, length * 0.7, angle - (Math.random() - 0.5) * 0.7, depth - 1);
        }

        function hammerRebootEffect() {
            effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
            effectCtx.strokeStyle = "#2c2c2c";
            effectCtx.lineWidth = 5;
            effectCtx.lineCap = "round";
            const hammerBtn = document.getElementById('hammerButton');
            const btnRect = hammerBtn.getBoundingClientRect();
            const centerX = btnRect.left + btnRect.width / 2;
            const centerY = btnRect.top + btnRect.height / 2;
            let cracks = 0;
            const totalCracks = 20;
            const minLength = 180;
            const maxLength = 280;
            const interval = setInterval(() => {
                const angle = Math.random() * Math.PI * 2;
                const length = minLength + Math.random() * (maxLength - minLength);
                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;
                drawCrack(centerX + offsetX, centerY + offsetY, length, angle, 3);
                cracks++;
                if(cracks >= totalCracks) {
                    clearInterval(interval);
                    setTimeout(() => {
                        effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                    }, 3000);
                }
            }, 70);
        }

        function nukeRebootEffect() {
            effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
            let radius = 20;
            const maxRadius = Math.max(effectCanvas.width, effectCanvas.height);
            const centerX = effectCanvas.width/2;
            const centerY = effectCanvas.height/2;
            effectCtx.fillStyle = "white";
            effectCtx.fillRect(0, 0, effectCanvas.width, effectCanvas.height);
            setTimeout(() => {
                effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                let step = 0;
                const totalSteps = 11;
                const radiusStep = maxRadius / totalSteps;
                const interval = setInterval(() => {
                    effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                    const gradient = effectCtx.createRadialGradient(
                        centerX, centerY, radius * 0.2,
                        centerX, centerY, radius
                    );
                    gradient.addColorStop(0, "rgba(255,220,100,1)");
                    gradient.addColorStop(0.5, "rgba(255,100,30,0.8)");
                    gradient.addColorStop(1, "rgba(0,0,0,0)");
                    effectCtx.fillStyle = gradient;
                    effectCtx.beginPath();
                    effectCtx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    effectCtx.fill();
                    radius += radiusStep;
                    step++;
                    if(step >= totalSteps) {
                        clearInterval(interval);
                        let opacity = 0.8;
                        let fadeSteps = 0;
                        const totalFadeSteps = 5;
                        const fadeInterval = setInterval(() => {
                            effectCtx.fillStyle = `rgba(0,0,0,${opacity})`;
                            effectCtx.fillRect(0, 0, effectCanvas.width, effectCanvas.height);
                            opacity -= 0.16;
                            fadeSteps++;
                            if(fadeSteps >= totalFadeSteps || opacity <= 0) {
                                clearInterval(fadeInterval);
                                setTimeout(() => {
                                    effectCtx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                                }, 50);
                            }
                        }, 40);
                    }
                }, 28);
            }, 50);
        }

        // PÔVODNÉ PREMENNÉ A FUNKCIE
        const basicColors = [
            { name: "Red", code: "#FF0000" },
            { name: "Green", code: "#00FF00" },
            { name: "Blue", code: "#0000FF" },
            { name: "Cyan", code: "#00FFFF" },
            { name: "Magenta", code: "#FF00FF" },
            { name: "Yellow", code: "#FFFF00" },
            { name: "White", code: "#FFFFFF" },
            { name: "Black", code: "#000000" }
        ];

        const colorRows = [
            { shades: ["#B30000", "#CC0000", "#E60000", "#FF0000", "#FF3333", "#FF6666", "#FF9999", "#FFCCCC", "#FFE5E5"] },
            { shades: ["#B36200", "#CC7000", "#E67E00", "#FF8C00", "#FFA033", "#FFB466", "#FFC899", "#FFDCCC", "#FFEEE6"] },
            { shades: ["#B3B300", "#CCCC00", "#E6E600", "#FFFF00", "#FFFF33", "#FFFF66", "#FFFF99", "#FFFFCC", "#FFFFE5"] },
            { shades: ["#00B300", "#00CC00", "#00E600", "#00FF00", "#33FF33", "#66FF66", "#99FF99", "#CCFFCC", "#E5FFE5"] },
            { shades: ["#0000B3", "#0000CC", "#0000E6", "#0000FF", "#3333FF", "#6666FF", "#9999FF", "#CCCCFF", "#E5E5FF"] },
            { shades: ["#6B00B3", "#7A00CC", "#8A00E6", "#9900FF", "#AD33FF", "#C266FF", "#D699FF", "#EBCCFF", "#F5E5FF"] },
            { shades: ["#666666", "#808080", "#999999", "#B3B3B3", "#CCCCCC", "#E6E6E6", "#F0F0F0", "#F5F5F5", "#FAFAFA"] }
        ];

        let rebootCounter = 0;
        
        function loadCounter() {
            const savedCounter = localStorage.getItem('rebootCounter');
            if (savedCounter !== null) {
                rebootCounter = parseInt(savedCounter);
                updateCounterDisplay();
            }
        }
        
        function saveCounter() {
            localStorage.setItem('rebootCounter', rebootCounter);
        }
        
        function updateCounterDisplay() {
            document.getElementById('counterValue').textContent = rebootCounter;
        }
        
        function addDamage(amount) {
            rebootCounter = rebootCounter + amount;
            if (rebootCounter >= 10) {
                rebootCounter = rebootCounter % 10;
            }
            updateCounterDisplay();
            saveCounter();
        }
        
        function reboot() {
            addDamage(1);
        }
        
        function hammerReboot() {
            addDamage(3);
            hammerRebootEffect();
        }
        
        function nukeReboot() {
            addDamage(5);
            nukeRebootEffect();
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const hideSeconds = document.getElementById('hideSecondsCheckbox').checked;
            let timeString = hideSeconds ? hours + ":" + minutes : hours + ":" + minutes + ":" + seconds;
            document.getElementById('clock').textContent = timeString;
        }

        let currentDrawColor = "#000000";
        
        function setColor(colorCode) {
            const colorDisplay = document.getElementById('colorDisplay');
            colorDisplay.style.backgroundColor = colorCode;
            currentDrawColor = colorCode;
        }

        // ---- Farebné plátno (pôvodné) ----
        let canvas = document.getElementById('drawCanvas');
        let ctx = canvas.getContext('2d');
        let drawing = false;
        
        function resizeCanvas() {
            if (canvas.width !== 1600 || canvas.height !== 500) {
                canvas.width = 1600;
                canvas.height = 500;
            }
            ctx.strokeStyle = currentDrawColor;
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        function getCanvasCoordinates(e, targetCanvas) {
            const rect = targetCanvas.getBoundingClientRect();
            const scaleX = targetCanvas.width / rect.width;
            const scaleY = targetCanvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(targetCanvas.width, x));
            y = Math.max(0, Math.min(targetCanvas.height, y));
            return { x, y };
        }
        
        function startDrawing(e, targetCanvas, targetCtx) {
            e.preventDefault();
            drawing = true;
            const { x, y } = getCanvasCoordinates(e, targetCanvas);
            targetCtx.beginPath();
            targetCtx.moveTo(x, y);
        }
        
        function draw(e, targetCanvas, targetCtx, color) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e, targetCanvas);
            targetCtx.strokeStyle = color;
            targetCtx.lineTo(x, y);
            targetCtx.stroke();
            targetCtx.beginPath();
            targetCtx.moveTo(x, y);
        }
        
        function stopDrawing(e) {
            if (e) e.preventDefault();
            drawing = false;
            // Záleží na aktuálnom kontexte - ale každé plátno si ukončí vlastnú cestu
            if (activeCanvas === 'color') {
                ctx.beginPath();
            } else if (activeCanvas === 'whiteboard') {
                whiteboardCtx.beginPath();
            }
        }
        
        function clearCanvas() {
            if (activeCanvas === 'color') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
            } else if (activeCanvas === 'whiteboard') {
                whiteboardCtx.clearRect(0, 0, whiteboardCanvas.width, whiteboardCanvas.height);
                whiteboardCtx.beginPath();
            }
        }
        
        resizeCanvas();
        
        // ---- Biele plátno pre mód Plátno (kreslenie čiernou) ----
        let whiteboardCanvas = document.getElementById('whiteboardCanvas');
        let whiteboardCtx = whiteboardCanvas.getContext('2d');
        
        function resizeWhiteboardCanvas() {
            if (whiteboardCanvas.width !== 1600 || whiteboardCanvas.height !== 500) {
                whiteboardCanvas.width = 1600;
                whiteboardCanvas.height = 500;
            }
            whiteboardCtx.strokeStyle = "#000000";
            whiteboardCtx.lineWidth = 8;
            whiteboardCtx.lineCap = 'round';
            whiteboardCtx.lineJoin = 'round';
            whiteboardCtx.fillStyle = "white";
            whiteboardCtx.fillRect(0, 0, whiteboardCanvas.width, whiteboardCanvas.height);
        }
        resizeWhiteboardCanvas();
        
        // Ktoré plátno je aktívne pre kreslenie? 'color' alebo 'whiteboard'
        let activeCanvas = 'color'; // štandardne farby
        
        // Prepínanie udalostí myši/touch podľa aktívneho plátna
        function rebindEvents() {
            // Odstránime všetky eventy z oboch canvasov
            const canvases = [canvas, whiteboardCanvas];
            canvases.forEach(c => {
                c.removeEventListener('mousedown', handleStart);
                c.removeEventListener('mousemove', handleMove);
                c.removeEventListener('mouseup', handleStop);
                c.removeEventListener('mouseleave', handleStop);
                c.removeEventListener('touchstart', handleStart);
                c.removeEventListener('touchmove', handleMove);
                c.removeEventListener('touchend', handleStop);
                c.removeEventListener('touchcancel', handleStop);
            });
            
            // Pridáme eventy iba na aktívny canvas
            const active = (activeCanvas === 'color') ? canvas : whiteboardCanvas;
            active.addEventListener('mousedown', handleStart);
            active.addEventListener('mousemove', handleMove);
            active.addEventListener('mouseup', handleStop);
            active.addEventListener('mouseleave', handleStop);
            active.addEventListener('touchstart', handleStart, { passive: false });
            active.addEventListener('touchmove', handleMove, { passive: false });
            active.addEventListener('touchend', handleStop);
            active.addEventListener('touchcancel', handleStop);
        }
        
        function handleStart(e) {
            if (activeCanvas === 'color') {
                startDrawing(e, canvas, ctx);
            } else {
                startDrawing(e, whiteboardCanvas, whiteboardCtx);
            }
        }
        
        function handleMove(e) {
            if (activeCanvas === 'color') {
                draw(e, canvas, ctx, currentDrawColor);
            } else {
                draw(e, whiteboardCanvas, whiteboardCtx, "#000000");
            }
        }
        
        function handleStop(e) {
            stopDrawing(e);
        }
        
        // Inicializácia udalostí
        rebindEvents();
        
        // Vymazanie plátna (oba)
        const clearBtn = document.getElementById('clearButton');
        clearBtn.onclick = clearCanvas;
        clearBtn.ontouchstart = (e) => { e.preventDefault(); clearCanvas(); };
        
        // Prepínanie medzi režimami Colors a Plátno
        const colorsSection = document.getElementById('colorsSection');
        const colorCanvas = document.getElementById('drawCanvas');
        const whiteboardCanvasElem = document.getElementById('whiteboardCanvas');
        const colorsModeBtn = document.getElementById('colorsModeBtn');
        const canvasModeBtn = document.getElementById('canvasModeBtn');
        
        function setModeColors() {
            activeCanvas = 'color';
            colorsSection.classList.remove('hidden');
            colorCanvas.classList.remove('hidden');
            whiteboardCanvasElem.classList.remove('active');
            whiteboardCanvasElem.style.display = 'none';
            colorCanvas.style.display = 'block';
            colorsModeBtn.classList.add('active');
            canvasModeBtn.classList.remove('active');
            rebindEvents();
        }
        
        function setModeCanvas() {
            activeCanvas = 'whiteboard';
            colorsSection.classList.add('hidden');
            colorCanvas.classList.add('hidden');
            colorCanvas.style.display = 'none';
            whiteboardCanvasElem.style.display = 'block';
            whiteboardCanvasElem.classList.add('active');
            colorsModeBtn.classList.remove('active');
            canvasModeBtn.classList.add('active');
            rebindEvents();
        }
        
        colorsModeBtn.addEventListener('click', setModeColors);
        colorsModeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setModeColors(); });
        canvasModeBtn.addEventListener('click', setModeCanvas);
        canvasModeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setModeCanvas(); });
        
        // Štandardne nastavíme režim Colors (aktívne)
        setModeColors();
        
        function renderBasicColors() {
            const container = document.getElementById('basicColors');
            container.innerHTML = '';
            basicColors.forEach(color => {
                const square = document.createElement('div');
                square.className = 'color-square';
                square.style.backgroundColor = color.code;
                square.title = color.name;
                square.onclick = () => setColor(color.code);
                square.ontouchstart = (e) => { e.preventDefault(); setColor(color.code); };
                container.appendChild(square);
            });
        }

        function renderColorRows() {
            const container = document.getElementById('colorRows');
            container.innerHTML = '';
            colorRows.forEach(row => {
                const grid = document.createElement('div');
                grid.className = 'extended-grid';
                row.shades.forEach(shade => {
                    const square = document.createElement('div');
                    square.className = 'extended-square';
                    square.style.backgroundColor = shade;
                    square.title = shade;
                    square.onclick = () => setColor(shade);
                    square.ontouchstart = (e) => { e.preventDefault(); setColor(shade); };
                    grid.appendChild(square);
                });
                container.appendChild(grid);
            });
        }

        loadCounter();
        renderBasicColors();
        renderColorRows();
        
        updateClock();
        setInterval(updateClock, 1000);
        
        document.getElementById('hideSecondsCheckbox').addEventListener('change', updateClock);
        document.getElementById('rebootButton').addEventListener('click', reboot);
        document.getElementById('rebootButton').addEventListener('touchstart', (e) => { e.preventDefault(); reboot(); });
        document.getElementById('hammerButton').addEventListener('click', hammerReboot);
        document.getElementById('hammerButton').addEventListener('touchstart', (e) => { e.preventDefault(); hammerReboot(); });
        document.getElementById('nukeButton').addEventListener('click', nukeReboot);
        document.getElementById('nukeButton').addEventListener('touchstart', (e) => { e.preventDefault(); nukeReboot(); });
        
        setColor("#000000");
    </script>
</body>
</html>
