<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farebná paleta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 40px;
        }

        .main-container {
            max-width: 3200px;
            margin: 0 auto;
        }

        /* Horná lišta */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Prvé okno - LEN ČAS (fixná šírka) */
        .clock-window {
            background-color: #f0f0f0;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 30px 50px;
            width: 650px;
            border: 2px solid #ddd;
        }

        .clock {
            font-size: 120px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 10px;
            color: #333;
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
        }

        /* Druhé okno - checkbox */
        .checkbox-window {
            background-color: #f0f0f0;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            border: 2px solid #ddd;
        }

        .big-checkbox input {
            width: 80px;
            height: 80px;
            cursor: pointer;
            transform: scale(1.3);
        }

        /* Tretie okno - DLHÝ OBDĹŽNIK pre farbu (od checkboxu po pravý okraj) */
        .color-window {
            background-color: #f0f0f0;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 20px 30px;
            flex: 1;
            min-width: 400px;
            border: 2px solid #ddd;
        }

        .color-display {
            width: 100%;
            height: 140px;
            background-color: #000000;
            border: 4px solid #333;
            border-radius: 20px;
            transition: background-color 0.2s ease;
        }

        /* Sekcia farieb */
        .colors-section {
            margin-top: 50px;
        }

        .section-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
        }

        .color-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 50px;
        }

        .color-square {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 3px solid #ddd;
        }

        .color-square:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border-color: #333;
        }

        .color-square:active {
            transform: scale(0.95);
        }

        .extended-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 50px;
        }

        .extended-square {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid #ccc;
        }

        .extended-square:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            border-color: #333;
        }

        .extended-square:active {
            transform: scale(0.95);
        }

        /* REBOOT sekcia */
        .reboot-section {
            margin-top: 60px;
            padding: 30px;
            background-color: #f8f8f8;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .reboot-button {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 30px 60px;
            font-size: 36px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .reboot-button:hover {
            background-color: #cc0000;
            transform: scale(1.02);
        }

        .reboot-button:active {
            transform: scale(0.98);
        }

        .counter-container {
            display: inline-flex;
            align-items: center;
            gap: 25px;
            background-color: white;
            padding: 20px 35px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .counter-label {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .counter-value {
            font-size: 64px;
            font-weight: bold;
            color: #ff4444;
            font-family: 'Courier New', monospace;
            min-width: 120px;
            text-align: center;
        }

        /* Kresliace plátno */
        .draw-section {
            margin-top: 60px;
        }

        .draw-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
        }

        canvas {
            border: 4px solid #333;
            border-radius: 15px;
            background-color: white;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            height: auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Horná lišta s tromi oknami -->
        <div class="top-bar">
            <!-- Prvé okno: LEN ČAS (fixná šírka) -->
            <div class="clock-window">
                <div class="clock" id="clock">--:--:--</div>
            </div>

            <!-- Druhé okno: LEN CHECKBOX -->
            <div class="checkbox-window">
                <div class="big-checkbox">
                    <input type="checkbox" id="hideSecondsCheckbox">
                </div>
            </div>

            <!-- Tretie okno: DLHÝ OBDĹŽNIK pre farbu (roztiahne sa od checkboxu po pravý okraj) -->
            <div class="color-window">
                <div class="color-display" id="colorDisplay"></div>
            </div>
        </div>

        <div class="colors-section">
            <div class="section-title">Základné farby (epapier)</div>
            <div class="color-grid" id="basicColors"></div>

            <div class="section-title">Rozšírené farby</div>
            <div class="extended-grid" id="extendedColors"></div>
        </div>

        <div class="reboot-section">
            <button class="reboot-button" id="rebootButton">REBOOT</button>
            <div class="counter-container">
                <span class="counter-label">Počet REBOOTOV:</span>
                <span class="counter-value" id="counterValue">0</span>
            </div>
        </div>

        <div class="draw-section">
            <div class="draw-title">Kresliace plátno</div>
            <canvas id="drawCanvas" width="1200" height="800"></canvas>
        </div>
    </div>

    <script>
        const basicColors = [
            { name: "Červená", code: "#FF0000" },
            { name: "Zelená", code: "#00FF00" },
            { name: "Modrá", code: "#0000FF" },
            { name: "Žltá", code: "#FFFF00" },
            { name: "Oranžová", code: "#FFA500" },
            { name: "Fialová", code: "#800080" },
            { name: "Ružová", code: "#FFC0CB" }
        ];

        const extendedColors = [
            { name: "Červená", code: "#FF0000" },
            { name: "Tmavočervená", code: "#8B0000" },
            { name: "Vínová", code: "#800000" },
            { name: "Koralová", code: "#FF7F50" },
            { name: "Lososová", code: "#FA8072" },
            { name: "Oranžová", code: "#FFA500" },
            { name: "Oranžovočervená", code: "#FF4500" },
            { name: "Oker", code: "#CC7722" },
            { name: "Jantárová", code: "#FFBF00" },
            { name: "Žltá", code: "#FFFF00" },
            { name: "Zlatá", code: "#FFD700" },
            { name: "Krémová", code: "#FFFDD0" },
            { name: "Béžová", code: "#F5F5DC" },
            { name: "Zelená", code: "#00FF00" },
            { name: "Tmavozelená", code: "#006400" },
            { name: "Olivová", code: "#808000" },
            { name: "Mätová", code: "#98FB98" },
            { name: "Tyrkysová", code: "#40E0D0" },
            { name: "Modrá", code: "#0000FF" },
            { name: "Tmavomodrá", code: "#00008B" },
            { name: "Námornícka modrá", code: "#000080" },
            { name: "Azúrová", code: "#007FFF" },
            { name: "Neónová modrá", code: "#1E90FF" },
            { name: "Indigo", code: "#4B0082" },
            { name: "Fialová", code: "#800080" },
            { name: "Levanduľová", code: "#E6E6FA" },
            { name: "Fuchsiová", code: "#FF00FF" },
            { name: "Ružová", code: "#FFC0CB" },
            { name: "Biela", code: "#FFFFFF" },
            { name: "Sivá", code: "#808080" },
            { name: "Čierna", code: "#000000" },
            { name: "Hnedá", code: "#A52A2A" }
        ];

        let rebootCounter = 0;
        
        function loadCounter() {
            const savedCounter = localStorage.getItem('rebootCounter');
            if (savedCounter !== null) {
                rebootCounter = parseInt(savedCounter);
                updateCounterDisplay();
            }
        }
        
        function saveCounter() {
            localStorage.setItem('rebootCounter', rebootCounter);
        }
        
        function updateCounterDisplay() {
            document.getElementById('counterValue').textContent = rebootCounter;
        }
        
        function reboot() {
            rebootCounter++;
            if (rebootCounter >= 10) {
                rebootCounter = 0;
            }
            updateCounterDisplay();
            saveCounter();
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const hideSeconds = document.getElementById('hideSecondsCheckbox').checked;
            
            let timeString;
            if (hideSeconds) {
                // Zachováme fixnú šírku tým, že sekundy nahradíme medzerami
                timeString = hours + ":" + minutes + "  ";
            } else {
                timeString = hours + ":" + minutes + ":" + seconds;
            }
            
            document.getElementById('clock').textContent = timeString;
        }

        let currentDrawColor = "#000000";
        
        function setColor(colorCode) {
            const colorDisplay = document.getElementById('colorDisplay');
            colorDisplay.style.backgroundColor = colorCode;
            currentDrawColor = colorCode;
        }

        let canvas = document.getElementById('drawCanvas');
        let ctx = canvas.getContext('2d');
        let drawing = false;
        
        ctx.strokeStyle = currentDrawColor;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            
            return { x, y };
        }
        
        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            const { x, y } = getCanvasCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e);
            ctx.strokeStyle = currentDrawColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        
        function stopDrawing(e) {
            if (e) e.preventDefault();
            drawing = false;
            ctx.beginPath();
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        function renderBasicColors() {
            const container = document.getElementById('basicColors');
            basicColors.forEach(color => {
                const square = document.createElement('div');
                square.className = 'color-square';
                square.style.backgroundColor = color.code;
                square.title = color.name;
                square.onclick = () => setColor(color.code);
                square.ontouchstart = (e) => {
                    e.preventDefault();
                    setColor(color.code);
                };
                container.appendChild(square);
            });
        }

        function renderExtendedColors() {
            const container = document.getElementById('extendedColors');
            extendedColors.forEach(color => {
                const square = document.createElement('div');
                square.className = 'extended-square';
                square.style.backgroundColor = color.code;
                square.title = color.name;
                square.onclick = () => setColor(color.code);
                square.ontouchstart = (e) => {
                    e.preventDefault();
                    setColor(color.code);
                };
                container.appendChild(square);
            });
        }

        loadCounter();
        renderBasicColors();
        renderExtendedColors();
        
        updateClock();
        setInterval(updateClock, 1000);
        
        document.getElementById('hideSecondsCheckbox').addEventListener('change', updateClock);
        document.getElementById('rebootButton').addEventListener('click', reboot);
        document.getElementById('rebootButton').addEventListener('touchstart', (e) => {
            e.preventDefault();
            reboot();
        });
        
        setColor("#000000");
    </script>
</body>
</html>
